{% extends 'base.html' %}

{% block content %}

<div style="max-width:800px;margin:40px auto;padding:30px;
            background:white;border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);">

    <h2 style="color:#0b3d91;">Dashboard Kelompok Tani</h2>

    <hr>

    <p><strong>ID Kelompok:</strong> {{ session.id_kelompok }}</p>
    <p><strong>Nama Kelompok:</strong> {{ session.nama_kelompok }}</p>

    <div style="margin-top:30px;display:flex;gap:15px;flex-wrap:wrap;">

        <a href="/proposal/input"
           style="padding:12px 20px;background:#123d8b;color:white;
                  border-radius:6px;text-decoration:none;">
            Input Proposal
        </a>

        <a href="/proposal/status"
           style="padding:12px 20px;background:#28a745;color:white;
                  border-radius:6px;text-decoration:none;">
            Cek Status Proposal
        </a>

        <a href="/proposal/logout"
           style="padding:12px 20px;background:#dc3545;color:white;
                  border-radius:6px;text-decoration:none;">
            Logout
        </a>

    </div>

</div>

{% endblock %}
