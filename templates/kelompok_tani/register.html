{% extends 'base.html' %}

{% block content %}

<div style="max-width:600px;margin:60px auto;padding:40px;
            background:#ffffff;border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);">

    <h2 style="color:#0b3d91;margin-bottom:25px;text-align:center;">
        Registrasi Kelompok Tani
    </h2>

    <!-- ✅ PESAN SUKSES -->
    {% if sukses %}
    <div style="background:#e6f4ea;padding:20px;border-radius:8px;
                color:#155724;text-align:center;margin-bottom:25px;">
        <h4>🎉 Registrasi Berhasil</h4>
        <p>ID Kelompok Anda:</p>
        <h3 style="color:#0b3d91;">{{ id_kelompok }}</h3>
        <p>Simpan ID ini untuk login ke sistem.</p>

        <a href="/proposal/login"
           style="display:inline-block;margin-top:10px;
                  padding:10px 20px;background:#123d8b;
                  color:white;text-decoration:none;
                  border-radius:6px;">
            Login Sekarang
        </a>
    </div>
    {% endif %}

    <!-- ✅ FORM REGISTER -->
    <form method="POST">

        <label>Nama Kelompok</label>
        <input type="text" name="nama_kelompok" required
               style="width:100%;padding:8px;margin-bottom:15px;">

        <label>Ketua Kelompok</label>
        <input type="text" name="ketua_kelompok" required
               style="width:100%;padding:8px;margin-bottom:15px;">

        <label>Kecamatan</label>
        <input type="text" name="kecamatan" required
               style="width:100%;padding:8px;margin-bottom:15px;">

        <label>Desa</label>
        <input type="text" name="desa" required
               style="width:100%;padding:8px;margin-bottom:15px;">

        <label>Jumlah Anggota</label>
        <input type="number" name="jumlah_anggota" required
               style="width:100%;padding:8px;margin-bottom:15px;">

        <label>Password</label>
        <input type="password" name="password" required
               style="width:100%;padding:8px;margin-bottom:20px;">

        <button type="submit"
                style="width:100%;padding:10px;
                       background:#123d8b;color:white;
                       border:none;border-radius:6px;">
            Daftar
        </button>

    </form>

    <div style="margin-top:15px;text-align:center;">
        Sudah punya akun?
        <a href="/proposal/login" style="color:#123d8b;font-weight:600;">
            Login di sini
        </a>
    </div>

</div>

{% endblock %}
