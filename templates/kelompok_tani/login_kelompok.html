{% extends 'base.html' %}

{% block content %}

<div style="max-width:500px;margin:40px auto;padding:30px;background:#ffffff;
            border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.08);">

    <h3 style="margin-bottom:10px;color:#0b3d91;">
        Selamat Datang Kembali!
    </h3>

    <p style="font-size:14px;margin-bottom:20px;">
        Belum memiliki akun?
        <a href="/proposal/register" style="color:#0b3d91;font-weight:600;">
            Silakan buat akun di sini
        </a>
    </p>

    {% if error %}
    <div style="color:red;margin-bottom:15px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <label style="font-weight:600;">ID Kelompok</label><br>
        <input type="text"
               name="id_kelompok"
               placeholder="Masukkan ID Kelompok"
               required
               style="width:100%;padding:8px;margin-top:5px;margin-bottom:15px;
                      border-radius:6px;border:1px solid #ccc;"><br>

        <label style="font-weight:600;">Password</label><br>
        <input type="password"
               name="password"
               placeholder="Masukkan Password"
               required
               style="width:100%;padding:8px;margin-top:5px;margin-bottom:20px;
                      border-radius:6px;border:1px solid #ccc;"><br>

        <button type="submit"
                style="width:100%;padding:10px;background:#123d8b;
                       color:white;border:none;border-radius:6px;
                       font-weight:600;">
            LOGIN
        </button>

    </form>

</div>

{% endblock %}
