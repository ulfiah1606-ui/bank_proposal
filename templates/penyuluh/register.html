<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Registrasi Penyuluh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .register-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .register-box {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, .08);
        }

        h2 {
            font-weight: 700;
            color: #0b3d91;
            margin-bottom: 25px;
        }

        .btn-submit {
            background: #0b3d91;
            color: white;
            font-weight: 600;
            border: none;
            padding: 12px;
            border-radius: 8px;
        }

        .btn-submit:hover {
            background: #082c6c;
        }
    </style>
</head>

<body>

    <div class="register-wrapper">
        <div class="register-box">

            <h2>Pendaftaran Penyuluh</h2>

            <!-- ✅ TAMPILKAN ERROR -->
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/register/penyuluh">

                <div class="mb-3">
                    <label>Nama Lengkap</label>
                    <!-- ✅ SUDAH SESUAI BACKEND -->
                    <input type="text" name="nama_lengkap" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">NIP Penyuluh</label>
                    <input type="text" name="nip_penyuluh" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label>Kecamatan Binaan</label>
                    <input type="text" name="kecamatan" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-submit w-100">
                    DAFTAR
                </button>

            </form>

            <div class="text-center mt-3">
                Sudah punya akun?
                <a href="/login/penyuluh" style="color:#0b3d91;font-weight:600;">
                    Login di sini
                </a>
            </div>

        </div>
    </div>

</body>

</html>
