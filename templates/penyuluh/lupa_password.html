<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Lupa Password Penyuluh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, .08);
        }

        h3 {
            text-align: center;
            color: #0b3d91;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .btn-reset {
            background: #0b3d91;
            color: white;
            border: none;
            height: 45px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="box">

            <h3>Reset Password</h3>

            {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
            {% endif %}

            {% if sukses %}
            <div class="alert alert-success text-center">
                {{ sukses }}
            </div>
            {% endif %}

            <form method="POST" action="/lupa-password/penyuluh">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Masukkan username" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password Baru</label>
                    <input type="password" name="password" class="form-control" placeholder="Masukkan password baru"
                        required>
                </div>

                <button type="submit" class="btn btn-reset w-100">
                    SIMPAN PASSWORD BARU
                </button>

            </form>

            <div class="text-center mt-4">
                <a href="/login/penyuluh">
                    Kembali ke Login
                </a>
            </div>

        </div>
    </div>

</body>

</html>
