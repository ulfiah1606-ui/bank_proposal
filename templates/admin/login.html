<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Admin - Bank Proposal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ebeef3,#ebeef3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD LOGIN */
.login-card{
    background:white;
    width:100%;
    max-width:420px;
    padding:50px 40px;
    border-radius:20px;
    box-shadow:0 20px 45px rgba(0,0,0,.15);
}

.login-card h3{
    font-weight:700;
    margin-bottom:30px;
    color:#0b3d91;
    text-align:center;
}

/* FORM */
.form-label{
    font-weight:600;
}

.form-control{
    height:48px;
    border-radius:10px;
    border:1px solid #dcdcdc;
}

.form-control:focus{
    border-color:#96989b;
    box-shadow:0 0 0 0.2rem rgba(11,61,145,.15);
}

/* BUTTON */
.btn-login{
    background:#0b3d91;
    color:white;
    border:none;
    height:48px;
    border-radius:10px;
    font-weight:600;
    margin-top:15px;
    transition:all .25s ease;
}

.btn-login:hover{
    background:#bbbdc0;
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* FOOTER */
.footer-text{
    font-size:13px;
    color:#6c757d;
    text-align:center;
    margin-top:25px;
}
</style>
</head>

<body>

<div class="login-card">

    <h3>Admin</h3>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-login w-100">
            LOGIN
        </button>

    </form>

    <div class="footer-text">
        © 2026 Dinas Pertanian Kabupaten Gowa
    </div>

</div>

</body>
</html>
