<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Proposal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">

            <h4 class="mb-4">✏ Edit Proposal</h4>

            <form method="POST">

                <!-- ID -->
                <div class="mb-3">
                    <label class="form-label">ID Proposal</label>
                    <input type="text" class="form-control"
                           value="{{ data.id_proposal }}" readonly>
                </div>

                <!-- STATUS -->
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-control">
                        <option value="diajukan" {% if data.status == 'diajukan' %}selected{% endif %}>Diajukan</option>
                        <option value="diproses" {% if data.status == 'diproses' %}selected{% endif %}>Diproses</option>
                        <option value="selesai" {% if data.status == 'selesai' %}selected{% endif %}>Selesai</option>
                    </select>
                </div>

                <hr>

                <!-- NARASI -->
                <h5 class="mt-3">Data Narasi</h5>

                <div class="mb-3">
                    <label>Latar Belakang</label>
                    <textarea class="form-control" readonly>{{ data.latar_belakang }}</textarea>
                </div>

                <div class="mb-3">
                    <label>Tujuan</label>
                    <textarea class="form-control" readonly>{{ data.tujuan }}</textarea>
                </div>

                <div class="mb-3">
                    <label>Kebutuhan</label>
                    <textarea class="form-control" readonly>{{ data.kebutuhan }}</textarea>
                </div>

                <div class="mb-3">
                    <label>Lokasi</label>
                    <input type="text" class="form-control"
                           value="{{ data.lokasi }}" readonly>
                </div>

                <hr>

                <!-- METRIK -->
                <h5 class="mt-3">Data Metrik</h5>

                <div class="mb-3">
                    <label>Luas Lahan</label>
                    <input type="text" class="form-control"
                           value="{{ data.luas_lahan }}" readonly>
                </div>

                <div class="mb-3">
                    <label>Jumlah Bantuan Sebelumnya</label>
                    <input type="text" class="form-control"
                           value="{{ data.jumlah_bantuan_sebelumnya }}" readonly>
                </div>

                <div class="mb-3">
                    <label>Pagu Anggaran</label>
                    <input type="text" class="form-control"
                           value="{{ data.pagu_anggaran }}" readonly>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/admin/proposal" class="btn btn-secondary">
                        ← Kembali
                    </a>

                    <button type="submit" class="btn btn-success">
                        💾 Simpan Perubahan
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
